<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Recursive:slnt,wght,CASL,CRSV,MONO@-15..0,300..900,0..1,0..1,0..1&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    background: #0b0d11;
    font-family: 'Recursive', -apple-system, sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* Subtle noise */
  .noise {
    position: absolute; inset: 0; opacity: 0.03; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 256px 256px;
  }

  /* Warm glow */
  .glow {
    position: absolute;
    top: -120px;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 500px;
    background: radial-gradient(ellipse, rgba(196, 168, 130, 0.04) 0%, transparent 70%);
    pointer-events: none;
  }

  .content {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
  }

  .mark-row {
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .wordmark {
    font-variation-settings: 'wght' 350, 'MONO' 0, 'CASL' 0, 'CRSV' 0.5, 'slnt' 0;
    font-size: 42px;
    letter-spacing: 10px;
    text-transform: uppercase;
    color: #d8dce4;
  }

  .tagline {
    font-variation-settings: 'wght' 400, 'MONO' 1, 'CASL' 0, 'CRSV' 0.5, 'slnt' 0;
    font-size: 15px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #5c6678;
  }

  .domain {
    font-variation-settings: 'wght' 400, 'MONO' 1, 'CASL' 0, 'CRSV' 0.5, 'slnt' 0;
    font-size: 13px;
    letter-spacing: 1.5px;
    color: #c4a882;
    opacity: 0.6;
    position: absolute;
    bottom: 36px;
  }

  /* Thin border frame */
  .frame {
    position: absolute;
    inset: 20px;
    border: 1px solid rgba(196, 168, 130, 0.08);
    border-radius: 2px;
    pointer-events: none;
  }
</style>
</head>
<body>

<div class="noise"></div>
<div class="glow"></div>
<div class="frame"></div>

<div class="content">
  <div class="mark-row">
    <svg width="72" height="72" viewBox="0 0 64 64" fill="none">
      <path d="M40 8 A26 26 0 1 0 40 56" fill="none" stroke="#c4a882" stroke-width="5" stroke-linecap="square"/>
      <path d="M20 50 L32 14 L44 50" fill="none" stroke="#d8dce4" stroke-width="2.2" stroke-linecap="square" stroke-linejoin="miter"/>
      <line x1="8" y1="34" x2="56" y2="34" stroke="#c4a882" stroke-width="1.2"/>
      <line x1="10" y1="40" x2="56" y2="40" stroke="#c4a882" stroke-width="0.8" opacity="0.35"/>
    </svg>
    <span class="wordmark">Atlas Crew</span>
  </div>
  <div class="tagline">Product Engineering · Security · Developer Tools</div>
  <div class="domain">atlascrew.dev</div>
</div>

</body>
</html>
